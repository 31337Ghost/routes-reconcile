services:
  route-reconcile:
    image: ghcr.io/31337ghost/routes-reconcile:latest
    container_name: routes-reconcile
    restart: unless-stopped
    environment:
      MT_HOST: ${MT_HOST}
      MT_USER: ${MT_USER}
      MT_PASS: ${MT_PASS}
      MT_USE_SSL: ${MT_USE_SSL:-true}
      MT_SSL_VERIFY: ${MT_SSL_VERIFY:-false}
      MT_PORT: ${MT_PORT:-8729}
      MT_WG_GW: ${MT_WG_GW:-wg0}
      MT_DOMAINS: ${MT_DOMAINS:-}
      MT_DRY_RUN: ${MT_DRY_RUN:-false}
      MT_STALE_AFTER_HOURS: ${MT_STALE_AFTER_HOURS:-48}
    volumes:
      - ./.state:/state
